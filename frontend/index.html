<html lang="en">

<head>
  <meta charset="UTF-8">

  <title>Marketplace RAG Agent</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ethiGreen: '#009739',
            ethiYellow: '#FFD100',
            ethiRed: '#EF3340',
            ethiGold: '#D4AF37',
            ethiDark: '#121212',
          },
          fontFamily: {
            'inter': ['Inter', 'sans-serif'],
            'ethiopic': ['Noto Sans Ethiopic', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Ethiopic:wght@100..900&display=swap');

    body {
      font-family: 'Inter', 'Noto Sans Ethiopic', sans-serif;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    .tibeb-bg {
      background-color: #ffffff;
      background-image: linear-gradient(30deg, #009739 12%, transparent 12.5%, transparent 87%, #009739 87.5%, #009739),
        linear-gradient(150deg, #009739 12%, transparent 12.5%, transparent 87%, #009739 87.5%, #009739),
        linear-gradient(30deg, #009739 12%, transparent 12.5%, transparent 87%, #009739 87.5%, #009739),
        linear-gradient(150deg, #009739 12%, transparent 12.5%, transparent 87%, #009739 87.5%, #009739),
        linear-gradient(60deg, #FFD100 25%, transparent 25.5%, transparent 75%, #FFD100 75%, #FFD100),
        linear-gradient(60deg, #FFD100 25%, transparent 25.5%, transparent 75%, #FFD100 75%, #FFD100);
      background-size: 80px 140px;
      background-position: 0 0, 0 0, 40px 70px, 40px 70px, 0 0, 40px 70px;
      opacity: 0.03;
    }

    .tibeb-border {
      border-image: linear-gradient(to right, #009739, #FFD100, #EF3340) 1;
    }

    .ease-elastic {
      transition-timing-function: cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }
  </style>
